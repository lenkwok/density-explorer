<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Density Prediction Game</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            width: 100%;
            max-width: 700px;
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 25px 20px;
            text-align: center;
        }
        .header h1 { font-size: 26px; margin-bottom: 5px; }
        .header p { font-size: 13px; opacity: 0.9; }
        .content {
            padding: 25px 20px;
        }
        .score-box {
            background: #f5f5f5;
            border-left: 4px solid #667eea;
            padding: 12px;
            margin-bottom: 20px;
            border-radius: 6px;
            font-weight: bold;
            color: #667eea;
        }
        .question-card {
            background: #e8f4f8;
            border: 3px solid #667eea;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            margin-bottom: 20px;
        }
        .emoji { font-size: 50px; margin: 10px 0; }
        .object-label { font-size: 18px; font-weight: bold; color: #333; margin: 10px 0; }
        .question-text { font-size: 14px; color: #666; margin: 15px 0; }
        .button-row {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin: 15px 0;
        }
        .btn {
            padding: 12px 24px;
            font-size: 14px;
            font-weight: bold;
            border: 2px solid;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            background: white;
            flex: 1;
        }
        .btn-float {
            border-color: #4CAF50;
            color: #4CAF50;
        }
        .btn-float:hover:not(:disabled) {
            background: #4CAF50;
            color: white;
        }
        .btn-sink {
            border-color: #F44336;
            color: #F44336;
        }
        .btn-sink:hover:not(:disabled) {
            background: #F44336;
            color: white;
        }
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .feedback-box {
            padding: 12px;
            border-radius: 8px;
            font-weight: bold;
            margin: 15px 0;
            min-height: 20px;
            text-align: center;
            font-size: 14px;
        }
        .feedback-box.correct {
            background: #d4edda;
            color: #155724;
            border: 2px solid #4CAF50;
        }
        .feedback-box.incorrect {
            background: #f8d7da;
            color: #721c24;
            border: 2px solid #F44336;
        }
        .next-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 13px;
            width: 100%;
            margin-top: 10px;
        }
        .next-btn:hover {
            background: #764ba2;
        }
        .game-over-screen {
            text-align: center;
            padding: 20px;
        }
        .game-over-screen h2 {
            font-size: 24px;
            color: #333;
            margin-bottom: 15px;
        }
        .final-score {
            font-size: 40px;
            font-weight: bold;
            color: #667eea;
            margin: 15px 0;
        }
        .message {
            font-size: 14px;
            color: #666;
            margin-bottom: 20px;
            line-height: 1.5;
        }
        .restart-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
        }
        .restart-btn:hover {
            background: #764ba2;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎯 Density Prediction Game</h1>
            <p>Predict if objects float or sink!</p>
        </div>
        <div class="content" id="gameContent">
            <div class="score-box" id="scoreBox">Score: 0 / 0</div>
            
            <div class="question-card">
                <div class="emoji" id="emoji"></div>
                <div class="object-label" id="objectLabel"></div>
                <div class="question-text">Will this sink or float in water?</div>
                
                <div class="button-row">
                    <button class="btn btn-float" id="floatBtn" onclick="answerQuestion('float')">⬆️ Float</button>
                    <button class="btn btn-sink" id="sinkBtn" onclick="answerQuestion('sink')">⬇️ Sink</button>
                </div>
                
                <div class="feedback-box" id="feedback"></div>
                
                <button class="next-btn" id="nextBtn" onclick="nextQuestion()" style="display:none;">Next Question →</button>
            </div>
        </div>
    </div>

    <script>
        const objects = [
            { emoji: '🔩', name: 'Iron Block', correct: 'sink', density: '7.87 g/cm³' },
            { emoji: '🔵', name: 'Marble', correct: 'sink', density: '2.51 g/cm³' },
            { emoji: '🪨', name: 'Rock', correct: 'sink', density: '2.65 g/cm³' },
            { emoji: '🎲', name: 'Plastic', correct: 'float', density: '0.95 g/cm³' },
            { emoji: '🪵', name: 'Wood', correct: 'float', density: '0.6 g/cm³' },
            { emoji: '🍾', name: 'Cork', correct: 'float', density: '0.24 g/cm³' }
        ];

        let currentIndex = 0;
        let score = 0;
        let answered = false;

        function loadQuestion() {
            const obj = objects[currentIndex];
            document.getElementById('emoji').textContent = obj.emoji;
            document.getElementById('objectLabel').textContent = obj.name;
            document.getElementById('feedback').textContent = '';
            document.getElementById('feedback').className = 'feedback-box';
            document.getElementById('floatBtn').disabled = false;
            document.getElementById('sinkBtn').disabled = false;
            document.getElementById('nextBtn').style.display = 'none';
            answered = false;
        }

        function answerQuestion(choice) {
            if (answered) return;
            answered = true;

            const obj = objects[currentIndex];
            const isCorrect = choice === obj.correct;
            const feedback = document.getElementById('feedback');

            if (isCorrect) {
                score++;
                feedback.textContent = `✓ Correct! ${obj.name} (${obj.density}) ${obj.correct}s!`;
                feedback.className = 'feedback-box correct';
            } else {
                feedback.textContent = `✗ Not quite! ${obj.name} (${obj.density}) actually ${obj.correct}s!`;
                feedback.className = 'feedback-box incorrect';
            }

            document.getElementById('scoreBox').textContent = `Score: ${score} / ${currentIndex + 1}`;
            document.getElementById('floatBtn').disabled = true;
            document.getElementById('sinkBtn').disabled = true;

            if (currentIndex < objects.length - 1) {
                document.getElementById('nextBtn').style.display = 'block';
            } else {
                setTimeout(showGameOver, 1500);
            }
        }

        function nextQuestion() {
            currentIndex++;
            loadQuestion();
        }

        function showGameOver() {
            const percentage = Math.round((score / objects.length) * 100);
            let message = '';
            
            if (percentage === 100) {
                message = "Perfect score! You're a density expert! 🌟";
            } else if (percentage >= 80) {
                message = "Great job! You understand density well! 👏";
            } else if (percentage >= 60) {
                message = "Good effort! Keep practicing! 💪";
            } else {
                message = "Good try! Watch the explorer again to learn more. 📚";
            }

            document.getElementById('gameContent').innerHTML = `
                <div class="game-over-screen">
                    <h2>🎉 Game Complete!</h2>
                    <div class="final-score">${score} / ${objects.length}</div>
                    <div class="message">
                        <strong>${percentage}%</strong> Correct!<br><br>${message}
                    </div>
                    <button class="restart-btn" onclick="location.reload()">Play Again</button>
                </div>
            `;
        }

        loadQuestion();
    </script>
</body>
</html>
